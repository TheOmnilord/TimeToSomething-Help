<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="0.5" cy="0.42" r="0.75">
      <stop offset="0" stop-color="#1e2836"/>
      <stop offset="1" stop-color="#0b0f16"/>
    </radialGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ff8a3d" stop-opacity="0.45"/>
      <stop offset="0.6" stop-color="#ff8a3d" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#ff8a3d" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sand" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffe0a8"/>
      <stop offset="1" stop-color="#f79a3c"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- concentric sound-wave rings on the ground -->
  <g fill="none" stroke="#ff8a3d">
    <ellipse cx="256" cy="300" rx="228" ry="66" stroke-width="4" opacity="0.10"/>
    <ellipse cx="256" cy="300" rx="176" ry="51" stroke-width="5" opacity="0.18"/>
    <ellipse cx="256" cy="300" rx="124" ry="36" stroke-width="6" opacity="0.30"/>
  </g>

  <!-- soft glow behind the glass -->
  <rect x="56" y="56" width="400" height="400" fill="url(#glow)"/>

  <!-- hourglass -->
  <g stroke="#ff8a3d" stroke-linejoin="round" stroke-linecap="round">
    <!-- glass body: two funnels meeting at the neck -->
    <path d="M 176 120 L 336 120 L 262 256 L 336 392 L 176 392 L 250 256 Z"
          fill="#ff8a3d" fill-opacity="0.10" stroke-width="11"/>

    <!-- sand: remaining in the top bulb -->
    <path d="M 214 214 L 298 214 L 260 256 L 252 256 Z" fill="url(#sand)" stroke="none"/>
    <!-- sand: pile in the bottom bulb -->
    <path d="M 196 392 L 316 392 L 292 356 L 220 356 Z" fill="url(#sand)" stroke="none"/>
    <!-- falling stream -->
    <rect x="251" y="248" width="10" height="112" fill="url(#sand)" stroke="none"/>

    <!-- frame caps -->
    <rect x="156" y="100" width="200" height="24" rx="12" fill="#ff8a3d" stroke="none"/>
    <rect x="156" y="388" width="200" height="24" rx="12" fill="#ff8a3d" stroke="none"/>
  </g>
</svg>
